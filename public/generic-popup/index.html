<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Popup</title>
</head>
<style>
/* ── Popup Scoped Styles (no external deps) ── */

.n9-popup-overlay,
.n9-popup-overlay * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

.n9-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    backdrop-filter: blur(12px);
    z-index: 99999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: n9FadeIn 0.3s ease-out;
}

@keyframes n9FadeIn { from { opacity: 0; } to { opacity: 1; } }

.n9-popup-overlay.active { display: flex; }

.n9-popup-overlay .popup-container {
    background: #0f0f0f;
    border: 1px solid rgba(190,148,49,0.3);
    border-radius: 1.25rem;
    overflow: hidden;
    display: flex;
    position: relative;
    padding-top: 38px;
    box-shadow: 0 15px 50px rgba(0,0,0,0.8), 0 0 20px rgba(190,148,49,0.1);
    width: 744px;
    height: 576px;
    max-width: 90vw;
    max-height: 90vh;
}

.n9-popup-overlay .close-btn {
    position: absolute;
    top: 6px; right: 8px;
    background: #dc2626;
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 5px 12px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 10px; font-weight: 800;
    z-index: 100;
    display: flex; align-items: center; justify-content: center;
    gap: 6px;
    text-transform: uppercase; letter-spacing: 1.5px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    transition: all 0.3s ease;
}
.n9-popup-overlay .close-btn:hover { background: #b91c1c; transform: scale(1.05); }
.n9-popup-overlay .close-btn .n9-icon { width: 12px; height: 12px; flex-shrink: 0; }

.n9-popup-overlay .sidebar {
    width: 180px;
    background: #1a1a1a;
    border-right: 1px solid rgba(190,148,49,0.1);
    display: flex; flex-direction: column;
    padding: 12px;
    overflow-y: auto;
    flex-shrink: 0;
}

.n9-popup-overlay .tab-btn {
    background: transparent;
    border: 1px solid transparent;
    color: rgba(255,255,255,0.6);
    padding: 10px 14px;
    text-align: left;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
    font-size: 10px; font-weight: 700;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
    transition: all 0.3s ease;
    text-transform: uppercase; letter-spacing: 0.5px;
}
.n9-popup-overlay .tab-btn-content { display: flex; align-items: center; gap: 8px; }
.n9-popup-overlay .tab-btn .n9-icon { width: 14px; height: 14px; flex-shrink: 0; }
.n9-popup-overlay .tab-btn .n9-chevron { width: 8px; height: 8px; flex-shrink: 0; opacity: 0; transition: all 0.3s ease; }
.n9-popup-overlay .tab-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
.n9-popup-overlay .tab-btn.active {
    background: linear-gradient(90deg, rgba(190,148,49,0.3), rgba(190,148,49,0.1));
    border-color: rgba(190,148,49,0.5);
    color: #fff;
}
.n9-popup-overlay .tab-btn.active .n9-chevron { opacity: 1; transform: translateX(4px); color: #be9431; }
.n9-popup-overlay .tab-btn.active .n9-icon { color: #f3d082; }

.n9-popup-overlay .content-area {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    background: rgba(255,255,255,0.02);
    position: relative;
}

.n9-popup-overlay .tab-title {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 22px; font-weight: 900;
    margin-bottom: 6px;
    background: linear-gradient(to bottom, #f3d082 0%, #be9431 50%, #967022 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    display: flex; align-items: center; gap: 10px;
}
.n9-popup-overlay .tab-title .n9-icon { width: 22px; height: 22px; flex-shrink: 0; color: #be9431; }

.n9-popup-overlay .tab-subtitle {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-bottom: 16px;
    font-weight: 500;
}

/* World Cup */
.n9-popup-overlay .wc-header {
    background: linear-gradient(135deg, rgba(190,148,49,0.2), transparent);
    border: 1px solid rgba(190,148,49,0.3);
    padding: 16px; border-radius: 1rem;
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px; gap: 14px;
}
.n9-popup-overlay .wc-kickoff { font-size: 9px; font-weight: 800; color: #be9431; letter-spacing: 1.5px; margin-bottom: 3px; }
.n9-popup-overlay .wc-main-title { font-size: 16px; font-weight: 900; color: #fff; font-style: italic; text-transform: uppercase; }

.n9-popup-overlay .countdown-grid { display: flex; gap: 8px; }
.n9-popup-overlay .cd-box {
    background: rgba(0,0,0,0.6);
    border: 1px solid rgba(190,148,49,0.2);
    padding: 6px; border-radius: 8px;
    min-width: 50px; text-align: center;
}
.n9-popup-overlay .cd-num { display: block; font-size: 16px; font-weight: 900; color: #f3d082; font-family: monospace; }
.n9-popup-overlay .cd-label { font-size: 7px; color: rgba(255,255,255,0.4); font-weight: 700; }

.n9-popup-overlay .wc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-bottom: 16px; }
.n9-popup-overlay .team-pill {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px; border-radius: 0.75rem;
    display: flex; flex-direction: column; align-items: center;
    transition: all 0.3s ease; cursor: pointer;
}
.n9-popup-overlay .team-pill:hover { background: rgba(190,148,49,0.15); border-color: rgba(190,148,49,0.4); }
.n9-popup-overlay .team-flag { width: 32px; height: 22px; object-fit: cover; border-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); margin-bottom: 8px; }
.n9-popup-overlay .team-name { color: #fff; font-size: 11px; font-weight: 800; margin-bottom: 3px; }
.n9-popup-overlay .team-odds { font-size: 9px; color: #be9431; font-weight: 600; }

.n9-popup-overlay .wc-how-to { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); padding: 16px; border-radius: 1rem; }
.n9-popup-overlay .how-to-title {
    font-size: 10px; font-weight: 900; color: #be9431;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.n9-popup-overlay .step-item { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; font-size: 11px; color: rgba(255,255,255,0.8); }
.n9-popup-overlay .step-num {
    width: 20px; height: 20px; background: #be9431; color: #000;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 9px; flex-shrink: 0;
}

/* Generic */
.n9-popup-overlay .responsive-img { width: 100%; max-height: 312px; object-fit: contain; border-radius: 1rem; display: block; }
.n9-popup-overlay .link-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
.n9-popup-overlay .backup-link {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    padding: 12px; border-radius: 8px; text-align: center;
    color: rgba(255,255,255,0.8); text-decoration: none;
    font-size: 11px; font-weight: 700; transition: all 0.3s ease;
}
.n9-popup-overlay .backup-link:hover { background: rgba(190,148,49,0.1); border-color: rgba(190,148,49,0.4); color: #f3d082; }

.n9-popup-overlay .cta-btn {
    width: 100%; padding: 12px; margin-top: 20px;
    background: linear-gradient(to bottom, #f3d082, #be9431, #967022);
    border: none; border-radius: 0.75rem;
    color: #fff; font-weight: 900; cursor: pointer;
    text-transform: uppercase; letter-spacing: 1.5px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    font-size: 12px; transition: all 0.3s ease;
}
.n9-popup-overlay .cta-btn:hover { box-shadow: 0 0 20px rgba(190,148,49,0.5); transform: translateY(-2px); }
.n9-popup-overlay .cta-btn:active { transform: scale(0.98); }
.n9-popup-overlay .cta-btn .n9-icon { width: 14px; height: 14px; flex-shrink: 0; }

.n9-popup-overlay .loading-spinner {
    position: absolute; inset: 0; background: #0f0f0f;
    display: flex; align-items: center; justify-content: center; z-index: 5;
}
.n9-popup-overlay .spinner {
    width: 30px; height: 30px;
    border: 3px solid rgba(190,148,49,0.2);
    border-top: 3px solid #be9431;
    border-radius: 50%;
    animation: n9Spin 1s linear infinite;
}

@keyframes n9Spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
@keyframes n9SlideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* Mobile */
@media (max-width: 768px) {
    .n9-popup-overlay .popup-container { flex-direction: column; width: 95vw; height: auto !important; max-height: 90vh; }
    .n9-popup-overlay .sidebar { width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 8px; border-right: none; border-bottom: 1px solid rgba(190,148,49,0.1); -webkit-overflow-scrolling: touch; scrollbar-width: none; gap: 4px; }
    .n9-popup-overlay .sidebar::-webkit-scrollbar { display: none; }
    .n9-popup-overlay .tab-btn { margin: 0; white-space: nowrap; flex-shrink: 0; justify-content: center; padding: 6px 10px; font-size: 9px; letter-spacing: 0.5px; border-radius: 6px; }
    .n9-popup-overlay .tab-btn .n9-chevron { display: none; }
    .n9-popup-overlay .tab-btn .n9-icon { width: 12px; height: 12px; }
    .n9-popup-overlay .tab-btn-content { gap: 5px; }
    .n9-popup-overlay .content-area { padding: 16px; }
    .n9-popup-overlay .tab-title { font-size: 18px; }
    .n9-popup-overlay .wc-header { flex-direction: column; padding: 14px; text-align: center; }
    .n9-popup-overlay .link-grid { grid-template-columns: 1fr; }
}
</style>
<body>

<!-- Popup will be injected here by script -->
<div id="n9PopupMount"></div>

<script>
(function() {
    /* ── Inline SVG Icons ── */
    var ICONS = {
        futbol: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20"/><path d="M12 2a14.5 14.5 0 0 1 0 20"/><line x1="2" y1="12" x2="22" y2="12"/></svg>',

        chartLine: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>',
        crown: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7z"/><path d="M10 22h4"/></svg>',
        bullseye: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        link: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>',
        download: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>',
        headset: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5zm0 0a9 9 0 1 1 18 0m0 0v5a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M21 16v2a4 4 0 0 1-4 4h-5"/></svg>',
        arrowRight: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>',
        bookmark: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>',
        android: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 18c0 .6.4 1 1 1h1v3.5a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5V19h2v3.5a.5.5 0 0 0 .5.5h1a.5.5 0 0 0 .5-.5V19h1c.6 0 1-.4 1-1V8H6v10z"/><path d="M3 8v8c0 .6.4 1 1 1h1V7H4c-.6 0-1 .4-1 1z"/><path d="M17 7h1c.6 0 1 .4 1 1v8c0 .6-.4 1-1 1h-1"/><circle cx="9" cy="11" r="1"/><circle cx="14" cy="11" r="1"/></svg>',
        apple: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20.94c1.5 0 2.75 1.06 4 1.06 3 0 6-8 6-12.22A4.91 4.91 0 0 0 17 5c-2.22 0-4 1.44-5 2-1-.56-2.78-2-5-2a4.9 4.9 0 0 0-5 4.78C2 14 5 22 8 22c1.25 0 2.5-1.06 4-1.06z"/><path d="M10 2c1 .5 2 2 2 5"/></svg>',
        commentDots: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><circle cx="9" cy="11" r="1"/><circle cx="13" cy="11" r="1"/><circle cx="17" cy="11" r="1"/></svg>',
        calendarCheck: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg>',
        circleInfo: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
        xmark: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
        chevronRight: '<svg class="n9-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
        dollar: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
        megaphone: '<svg class="n9-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>'
    };

    /* ── Data ──
       👇 只需修改 title、image、subtitle 即可，其他字段自动生成
          - title:    标签标题
          - subtitle: 标签描述文案
          - image:    展示图片链接
          - icon:     图标名称（可选，从下方 ICONS 对象里选，如 'trophy' / 'crown' / 'download'）
          - link:     按钮跳转链接（可选，不填则不显示按钮）
          - btnText:  按钮文字（可选，默认 "VIEW MORE"）
    ── */
    var simpleTabs = [
        { title: 'TELEGRAM GROUP',   subtitle: '📢 Join our Telegram for the latest promotions and exclusive updates.', image: 'https://static.gwvkyk.com/media/86da6de0e85a6d4e1cca7.jpg', link: 'https://t.me/nova9sg', btnText: 'JOIN CHANNEL', icon: 'megaphone' },
        { title: 'OFFICIAL BACKUP LINK', subtitle: '🌐 Official & Verified Backup Links Safe Access • Fast Login • Always Connected', image: 'https://static.gwvkyk.com/media/de1fda41e85a605f8b49f.jpg', link: 'https://nova9sg.co/backuplink', btnText: 'BACKUP LINK', icon: 'link' },
        { title: 'TOP REFERRAL EVENT', subtitle: '🏆 Top Referral Championship Refer Friends • Climb the Leaderboard • Win Big Cash Rewards', image: 'https://static.gwvkyk.com/media/8fd5a153e85a6f01609d6.jpg', link: 'https://nova9sg.co/referralevent', btnText: 'VIEW RANKING', icon: 'trophy' },
        { title: 'REBATE BENIFITS', subtitle: '💎 Premium Rebate Benifits Higher Play, Greater Rewards', image: 'https://static.gwvkyk.com/media/8fd5a153e85a6f01609d6.jpg', link: 'https://nova9sg.co/promotion', btnText: 'MORE INFO', icon: 'dollar' },
        { title: 'VIP PROGRAM',      subtitle: '👑 Unlock exclusive VIP rewards and premium benefits.', image: 'https://static.gwvkyk.com/media/0a477f74e85a610f16432.jpg', link: 'https://nova9sg.co/promotion', btnText: 'VIEW VIP REWARDS', icon: 'crown' },
        { title: 'DEPOSIT $30 GET FREE $50', subtitle: '💰 Deposit $30 today and claim your FREE $50 bonus.', image: 'https://cdn.nova9sg.net/popup/Popup-Free-SGD50.jpg', link: 'https://nova9sg.co/deposit', btnText: 'DEPOSIT NOW', icon: 'bullseye' },
        { title: 'DOWNLOAD APP',     subtitle: '📱 Download Nova9 App for faster access and exclusive rewards.', image: 'https://static.gwvkyk.com/media/c4b10f27e85a65700dc4a.jpg', link: 'https://nova9sg.ddrrww.top', btnText: 'DOWNLOAD NOW', icon: 'download' }
    ];

    // 自动根据 simpleTabs 生成完整的 promoData
    var defaultIcons = ['newspaper', 'trophy', 'chartLine', 'crown', 'bullseye', 'link', 'download'];
    var promoData = simpleTabs.map(function(tab, i) {
        var item = {
            id: 'tab-' + i,
            title: tab.title,
            icon: tab.icon || defaultIcons[i % defaultIcons.length],
            subtitle: tab.subtitle || '',
            type: 'single-image',
            content: { image: tab.image }
        };
        if (tab.link) {
            item.action = {
                text: tab.btnText || 'VIEW MORE',
                icon: 'arrowRight',
                link: tab.link,
                target: '_blank'
            };
        }
        return item;
    });

    /* ── Build DOM ── */
    var overlay = document.createElement('div');
    overlay.className = 'n9-popup-overlay';
    overlay.id = 'n9PopupOverlay';
    overlay.innerHTML = '<div class="popup-container">' +
        '<button class="close-btn" id="n9CloseBtn">' + ICONS.xmark + ' CLOSE</button>' +
        '<div class="sidebar" id="n9TabSidebar"></div>' +
        '<div class="content-area" id="n9ContentArea"></div>' +
        '</div>';

    function ensureInDOM() {
        if (!document.getElementById('n9PopupOverlay')) {
            document.body.appendChild(overlay);
        }
    }
    ensureInDOM();

    /* ── Refs ── */
    var activeTabId = promoData[0].id;
    var countdownInterval = null;

    function renderTabs() {
        var sidebar = document.getElementById('n9TabSidebar');
        if (!sidebar) return;
        var tabsHtml = promoData.map(function(item) {
            return '<button class="tab-btn' + (item.id === activeTabId ? ' active' : '') + '" data-id="' + item.id + '">' +
                '<div class="tab-btn-content">' + (ICONS[item.icon] || '') + '<span>' + item.title + '</span></div>' +
                ICONS.chevronRight + '</button>';
        }).join('');
        sidebar.innerHTML = tabsHtml;
    }

    function renderContent() {
        var contentArea = document.getElementById('n9ContentArea');
        if (!contentArea) return;
        var item = promoData.find(function(i) { return i.id === activeTabId; });
        if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }

        contentArea.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

        function getImageUrl() {
            if (item.type === 'single-image' || item.type === 'links') return item.content.image;
            if (item.type === 'slideshow') return item.content.images[0];
            return null;
        }
        var imageUrl = getImageUrl();

        if (imageUrl) {
            var img = new Image();
            var loaded = false;
            function showContent() {
                if (loaded) return;
                loaded = true;
                displayMainContent(item);
            }
            img.onload = showContent;
            img.onerror = showContent;
            img.src = imageUrl;
            // 缓存图片 onload 可能不触发，用 complete 兜底
            if (img.complete) showContent();
            // 3 秒超时兜底
            setTimeout(showContent, 3000);
        } else {
            displayMainContent(item);
        }
    }

    function displayMainContent(item) {
        var iconHtml = ICONS[item.icon] || '';
        var html = '<div class="animate-content" style="animation: n9SlideIn 0.5s ease-out forwards;">' +
            '<h2 class="tab-title">' + iconHtml + ' ' + item.title + '</h2>' +
            '<p class="tab-subtitle">' + item.subtitle + '</p>';

        if (item.type === 'worldcup') {
            var teamsHtml = item.content.teams.map(function(t) {
                return '<div class="team-pill"><img src="' + t.flag + '" class="team-flag" alt="' + t.name + '"><span class="team-name">' + t.name + '</span><span class="team-odds">' + t.odds + '</span></div>';
            }).join('');
            var stepsHtml = item.content.howToEnter.map(function(step, i) {
                return '<div class="step-item"><div class="step-num">' + (i + 1) + '</div><span>' + step + '</span></div>';
            }).join('');
            html += '<div class="wc-header"><div><div class="wc-kickoff">KICK-OFF · ' + item.content.kickoff + '</div><div class="wc-main-title">Champion Prediction</div></div>' +
                '<div class="countdown-grid"><div class="cd-box"><span class="cd-num" id="n9_d">00</span><span class="cd-label">DAYS</span></div><div class="cd-box"><span class="cd-num" id="n9_h">00</span><span class="cd-label">HRS</span></div><div class="cd-box"><span class="cd-num" id="n9_m">00</span><span class="cd-label">MIN</span></div><div class="cd-box"><span class="cd-num" id="n9_s">00</span><span class="cd-label">SEC</span></div></div></div>' +
                '<div class="wc-grid">' + teamsHtml + '</div>' +
                '<div class="wc-how-to"><div class="how-to-title">' + ICONS.circleInfo + ' How to submit your pick</div>' + stepsHtml + '</div>';
            startCountdown(item.content.countdownDate);
        } else if (item.type === 'slideshow') {
            html += '<img src="' + item.content.images[0] + '" class="responsive-img">';
        } else if (item.type === 'single-image' || item.type === 'links') {
            html += '<img src="' + item.content.image + '" class="responsive-img">';
            if (item.type === 'links') {
                var linksHtml = item.content.links.map(function(l) {
                    return '<a href="' + l.url + '" target="_blank" class="backup-link">' + l.text + '</a>';
                }).join('');
                html += '<div class="link-grid">' + linksHtml + '</div>';
            }
        }

        if (item.action) {
            var actionIcons = '';
            if (item.action.icons) {
                actionIcons = item.action.icons.map(function(ic) { return ICONS[ic] || ''; }).join('');
            } else {
                actionIcons = ICONS[item.action.icon] || '';
            }
            html += '<button class="cta-btn" id="n9CtaBtn">' + actionIcons + '<span>' + item.action.text + '</span></button>';
        }

        html += '</div>';
        var ca = document.getElementById('n9ContentArea');
        if (ca) ca.innerHTML = html;
    }

    function startCountdown(dateStr) {
        var target = new Date(dateStr).getTime();
        function update() {
            var dist = target - Date.now();
            if (dist < 0) return;
            var d = Math.floor(dist / 86400000);
            var h = Math.floor((dist % 86400000) / 3600000);
            var m = Math.floor((dist % 3600000) / 60000);
            var s = Math.floor((dist % 60000) / 1000);
            var setText = function(id, val) { var el = document.getElementById(id); if (el) el.innerText = String(val).padStart(2, '0'); };
            setText('n9_d', d); setText('n9_h', h); setText('n9_m', m); setText('n9_s', s);
        }
        update();
        countdownInterval = setInterval(update, 1000);
    }

    function handleAction(id) {
        var item = promoData.find(function(i) { return i.id === id; });
        if (!item || !item.action) return;
        if (item.action.link) {
            window.open(item.action.link, item.action.target || '_self');
        } else if (item.action.onclick) {
            // Try calling a globally defined function if exists, otherwise alert
            if (typeof window[item.action.onclick] === 'function') {
                window[item.action.onclick].apply(null, item.action.args || []);
            } else {
                alert('Triggered: ' + item.action.onclick);
            }
        }
    }

    // 事件委托：统一处理 close、tab 切换、CTA 按钮
    overlay.addEventListener('click', function(e) {
        // Close 按钮
        if (e.target.closest('#n9CloseBtn, .close-btn')) {
            overlay.classList.remove('active');
            return;
        }
        // Tab 按钮
        var tabBtn = e.target.closest('.tab-btn');
        if (tabBtn) {
            var newId = tabBtn.getAttribute('data-id');
            if (newId === activeTabId) return;
            activeTabId = newId;
            renderTabs();
            renderContent();
            return;
        }
        // CTA 按钮
        var ctaBtn = e.target.closest('#n9CtaBtn, .cta-btn');
        if (ctaBtn) {
            handleAction(activeTabId);
            return;
        }
    });

    // Expose public API
    window.N9Popup = {
        open: function() {
            ensureInDOM();
            // SPA 切换后可能内容被清空，重新渲染
            var sb = document.getElementById('n9TabSidebar');
            if (sb && !sb.querySelector('.tab-btn')) {
                renderTabs();
                renderContent();
            }
            overlay.classList.add('active');
        },
        close: function() { overlay.classList.remove('active'); },
        toggle: function() { overlay.classList.toggle('active'); }
    };

    // Auto-open for standalone demo
    setTimeout(function() { overlay.classList.add('active'); }, 500);

    renderTabs();
    renderContent();
})();
</script>
</body>
</html>
